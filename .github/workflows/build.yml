name: Build Windows EXE

on:
push:
branches: [main]
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pyinstaller pillow customtkinter

  - name: Download ExifTool
    shell: pwsh
    run: |
      Invoke-WebRequest "https://oliverbetz.de/cms/files/Artikel/ExifTool-for-Windows/ExifTool_install_13.59_64.exe" -OutFile ExifTool_install.exe
      Start-Process -FilePath ".\ExifTool_install.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=C:\ExifTool" -Wait

  - name: Build EXE
    shell: pwsh
    run: |
      pyinstaller `
        --onefile `
        --windowed `
        --name MetaZone `
        --icon=icon.ico `
        "--add-data=C:\ExifTool\exiftool.exe;exiftool_pkg" `
        metadata_tool.py

  - name: Upload EXE
    uses: actions/upload-artifact@v4
    with:
      name: MetaZone-Windows
      path: dist/MetaZone.exe
```
